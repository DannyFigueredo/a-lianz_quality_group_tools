<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Script IUL — Vista Profesional</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=DM+Mono&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f14;
      --node-bg: #13161d;
      --card-bg: #1a1e26;
      --accent: #c8a96e;
      --text: #e8eaf0;
      --muted: #6b7280;
      --line: rgba(200, 169, 110, 0.15);
    }

    body,
    html {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      font-family: 'Outfit', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    #viewport {
      width: 100vw;
      height: 100vh;
      position: relative;
      display: block;
    }

    #map-canvas {
      position: absolute;
      width: 8000px;
      height: 8000px;
      transition: transform 0.8s cubic-bezier(0.2, 0, 0.2, 1);
    }

    .node {
      position: absolute;
      background: var(--node-bg);
      border: 1px solid var(--line);
      padding: 25px;
      border-radius: 16px;
      transition: all 0.5s ease;
      opacity: 0.1;
      transform: scale(0.9);
    }

    .node.active {
      opacity: 1;
      transform: scale(1);
      border-color: var(--accent);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    .card-tag {
      font-family: 'DM Mono';
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 1px;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .script-box {
      background: rgba(255, 255, 255, 0.03);
      padding: 15px;
      border-radius: 8px;
      border-left: 3px solid var(--accent);
      margin-bottom: 10px;
    }

    .literal {
      font-size: 1.05rem;
      color: #fff;
      line-height: 1.5;
      display: block;
      margin-bottom: 8px;
    }

    .instruction {
      font-family: 'DM Mono';
      font-size: 10px;
      color: var(--accent);
      text-transform: uppercase;
      display: block;
      opacity: 0.8;
      margin-bottom: 4px;
    }

    .subphase-container {
      display: flex;
      gap: 15px;
      margin-top: 15px;
    }

    .sub-card {
      background: var(--card-bg);
      border: 1px solid var(--line);
      padding: 15px;
      border-radius: 10px;
      flex: 1;
    }

    .nav-ui {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      z-index: 1000;
    }

    .nav-btn {
      background: #1a1e26;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 10px 25px;
      border-radius: 50px;
      cursor: pointer;
      font-family: 'DM Mono';
      font-size: 12px;
      transition: 0.3s;
    }

    .nav-btn:hover {
      background: var(--accent);
      color: #000;
    }

    .q-item {
      font-size: 12px;
      color: #ccc;
      margin-bottom: 5px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 3px;
    }
  </style>
</head>

<body>

    // ==========================================
    // LÓGICA DE MOTOR DE VISTA
    // ==========================================
    let current = 0;
    let totalNodes = 0;

    function buildMap() {
      const data = scriptData.script;
      const canvas = document.getElementById('map-canvas');
      canvas.innerHTML = '';

      data.phases.forEach((phase, index) => {
        const node = document.createElement('div');
        node.id = `node-${index}`;
        node.className = 'node';

        // Posicionamiento dinámico
        const posX = 3000 + (index * 1300);
        const posY = 3000 + (index % 2 * 60);
        node.style.left = `${posX}px`;
        node.style.top = `${posY}px`;
        node.style.width = phase.sub_phases ? "1100px" : "500px";

        let html = `<div class="card-tag">FASE ${phase.order} — ${phase.title}</div>`;

        if (phase.script_literal) {
          html += `<div class="script-box">`;
          phase.script_literal.forEach(line => {
            html += `<span class="instruction">${line.step}</span>`;
            html += `<span class="literal">${line.text}</span>`;
          });
          html += `</div>`;
        }

        if (phase.sub_phases) {
          html += `<div class="subphase-container">`;
          phase.sub_phases.forEach(sp => {
            html += `
          <div class="sub-card">
            <div class="card-tag">${sp.id}</div>
            <div style="font-weight:600; font-size:13px; margin-bottom:10px;">${sp.title}</div>
            ${sp.questions_bank ? sp.questions_bank.map(bank => `
              <div style="margin-top:8px">
                <span class="instruction">${bank.tag}</span>
                ${bank.questions.map(q => `<div class="q-item">• ${q}</div>`).join('')}
              </div>
            `).join('') : ''}
          </div>`;
          });
          html += `</div>`;
        }

        if (phase.objection_paths) {
          html += `
        <div class="script-box" style="border-left-color: #e07b6a; background: rgba(224, 123, 106, 0.05);">
          <span class="instruction" style="color:#e07b6a;">Si hay objeción:</span>
          <span class="literal" style="font-size:0.95rem;">${phase.objection_paths[0].response_text}</span>
        </div>`;
        }

        node.innerHTML = html;
        canvas.appendChild(node);
      });

      totalNodes = data.phases.length;
      update();
    }

    function update() {
      const node = document.getElementById(`node-${current}`);
      if (!node) return;
      const canvas = document.getElementById('map-canvas');

      const offsetX = (window.innerWidth / 2) - (parseInt(node.style.left) + (node.offsetWidth / 2));
      const offsetY = (window.innerHeight / 2) - (parseInt(node.style.top) + (node.offsetHeight / 2));

      canvas.style.transform = `translate(${offsetX}px, ${offsetY}px)`;

      document.querySelectorAll('.node').forEach((n, i) => {
        n.classList.toggle('active', i === current);
      });
    }

    function move(dir) {
      current = Math.max(0, Math.min(totalNodes - 1, current + dir));
      update();
    }

    window.onload = buildMap;
    window.onresize = update;
  </script>
