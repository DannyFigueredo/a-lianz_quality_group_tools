<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A-Lianz Quality Group</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --border: rgba(255,255,255,0.07);
    --gold: #f0a832;
    --blue: #3b82f6;
    --text: #f1f5f9;
    --muted: #64748b;
    --nav-h: 54px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP NAV ── */
  nav {
    height: var(--nav-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 18px;
    gap: 10px;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 800;
    color: var(--text);
    margin-right: 10px;
    white-space: nowrap;
    letter-spacing: 0.04em;
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }
  .nav-logo .logo-main { font-size: 15px; letter-spacing: 0.08em; }
  .nav-logo .logo-sub  { font-size: 8px; font-weight: 600; letter-spacing: 0.22em; color: var(--muted); text-transform: uppercase; }

  .nav-divider {
    width: 1px;
    height: 24px;
    background: var(--border);
    margin: 0 4px;
  }

  /* Tab buttons */
  .tab-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 15px;
    border-radius: 8px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab-btn:hover {
    background: rgba(255,255,255,0.05);
    color: var(--text);
  }
  .tab-btn.active-gold {
    background: rgba(240,168,50,0.1);
    border-color: rgba(240,168,50,0.3);
    color: var(--gold);
  }
  .tab-btn.active-blue {
    background: rgba(59,130,246,0.1);
    border-color: rgba(59,130,246,0.3);
    color: var(--blue);
  }
  .tab-icon {
    font-size: 16px;
    line-height: 1;
  }

  /* Home button */
  .home-btn {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 13px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .home-btn:hover {
    border-color: rgba(255,255,255,0.2);
    color: var(--text);
  }

  /* ── IFRAME AREA ── */
  .iframe-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  iframe.visible { opacity: 1; }

  /* ── HOME SCREEN ── */
  #home-screen {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 0;
    background: var(--bg);
    z-index: 5;
    transition: opacity 0.3s;
  }
  #home-screen.hidden {
    opacity: 0;
    pointer-events: none;
  }

  /* Background decorations */
  #home-screen::before {
    content: '';
    position: absolute;
    top: -10%;
    left: -5%;
    width: 50%;
    height: 50%;
    background: radial-gradient(ellipse, rgba(240,168,50,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  #home-screen::after {
    content: '';
    position: absolute;
    bottom: -10%;
    right: -5%;
    width: 50%;
    height: 50%;
    background: radial-gradient(ellipse, rgba(59,130,246,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .home-inner {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 20px;
    width: 100%;
    max-width: 1100px;
  }

  .home-eyebrow {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .home-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .home-title span {
    background: linear-gradient(135deg, var(--gold), #fff8e1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .home-sub {
    font-size: 14px;
    color: var(--muted);
    margin-top: 20px;
    margin-bottom: 40px;
  }
  .home-qg {
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(11px, 1.4vw, 15px);
    font-weight: 600;
    letter-spacing: 0.28em;
    color: var(--muted);
    margin-top: 4px;
    margin-bottom: 0;
    text-transform: uppercase;
  }

  .home-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
    width: 100%;
  }

  .home-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: clamp(16px, 2.5vw, 24px) clamp(14px, 2vw, 22px);
    cursor: pointer;
    text-align: left;
    transition:
      transform 0.45s cubic-bezier(.22,1,.36,1),
      box-shadow 0.45s cubic-bezier(.22,1,.36,1),
      border-color 0.4s ease,
      background 0.4s ease;
    position: relative;
    overflow: hidden;
  }

  .home-card::before {
    content: '';
    position: absolute;
    top: 0; left: -100%; width: 60%; height: 100%;
    background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.045) 50%, transparent 60%);
    transition: left 0.6s cubic-bezier(.22,1,.36,1);
    pointer-events: none;
    z-index: 1;
  }
  .home-card:hover::before { left: 160%; }

  .home-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    border-radius: 16px 16px 0 0;
    opacity: 0.5;
    transition: opacity 0.4s ease, transform 0.4s ease;
    transform: scaleX(0.4);
    transform-origin: left;
  }
  .home-card.gold::after { background: linear-gradient(90deg, var(--gold), transparent); }
  .home-card.blue::after  { background: linear-gradient(90deg, var(--blue), transparent); }
  .home-card:hover::after { opacity: 1; transform: scaleX(1); }

  .home-card .card-glow {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    opacity: 0;
    transition: opacity 0.5s ease;
    pointer-events: none;
    z-index: 0;
  }
  .home-card.gold .card-glow { background: radial-gradient(ellipse at 25% 25%, rgba(240,168,50,0.1) 0%, transparent 65%); }
  .home-card.blue .card-glow  { background: radial-gradient(ellipse at 25% 25%, rgba(59,130,246,0.1) 0%, transparent 65%); }
  .home-card:hover .card-glow { opacity: 1; }

  .hc-icon {
    display: inline-block;
    transition: transform 0.45s cubic-bezier(.34,1.56,.64,1);
  }
  .home-card:hover .hc-icon { transform: scale(1.18) rotate(-6deg); }

  .hc-btn {
    transition: transform 0.35s cubic-bezier(.22,1,.36,1), filter 0.3s ease;
  }
  .home-card:hover .hc-btn { transform: translateX(5px); filter: brightness(1.12); }

  .home-card:hover {
    transform: translateY(-6px) scale(1.015);
  }
  .home-card.gold:hover {
    border-color: rgba(240,168,50,0.4);
    background: #131c2e;
    box-shadow:
      0 0 0 1px rgba(240,168,50,0.15),
      0 0 40px rgba(240,168,50,0.14),
      0 20px 48px rgba(0,0,0,0.4);
  }
  .home-card.blue:hover {
    border-color: rgba(59,130,246,0.4);
    background: #111d30;
    box-shadow:
      0 0 0 1px rgba(59,130,246,0.15),
      0 0 40px rgba(59,130,246,0.14),
      0 20px 48px rgba(0,0,0,0.4);
  }

  .hc-icon {
    font-size: 26px;
    margin-bottom: 12px;
    display: block;
  }
  .hc-tag {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .home-card.gold .hc-tag { color: var(--gold); }
  .home-card.blue .hc-tag  { color: var(--blue); }

  .hc-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(13px, 1.4vw, 15px);
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.25;
  }
  .hc-desc {
    font-size: clamp(11px, 1.1vw, 12px);
    color: var(--muted);
    line-height: 1.55;
    margin-bottom: 14px;
  }
  .hc-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 100px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    pointer-events: none;
  }
  .home-card.gold .hc-btn { background: linear-gradient(135deg, var(--gold), #c8881a); color: #1a0f00; }
  .home-card.blue .hc-btn  { background: linear-gradient(135deg, var(--blue), #1d4ed8); color: #fff; }

  /* Loading indicator */
  .loader {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
    background: var(--bg);
    z-index: 4;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .loader.show { opacity: 1; pointer-events: all; }
  .loader-spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loader-text { font-size: 13px; color: var(--muted); }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 560px) {
    .home-cards { grid-template-columns: 1fr; }
    .home-title { font-size: 1.8rem; }
    .tab-btn span:not(.tab-icon) { display: none; }
  }

  .home-inner > * { opacity: 0; transform: translateY(10px); animation: rise 0.5s forwards; }
  .home-eyebrow { animation-delay: 0.05s; }
  .home-title   { animation-delay: 0.12s; }
  .home-qg      { animation-delay: 0.17s; }
  .home-sub     { animation-delay: 0.22s; }
  .home-cards   { animation-delay: 0.29s; }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<!-- ── TOP NAV ── -->
<nav>
  <div class="nav-logo">
    <span class="logo-main">A-LIANZ</span>
    <span class="logo-sub">— Quality Group —</span>
  </div>
  <div class="nav-divider" id="nav-divider"></div>
  <div id="nav-tabs" style="display:flex;gap:6px;align-items:center;flex:1;overflow-x:auto"></div>
  <button class="home-btn" onclick="irHome()">🏠 Inicio</button>
</nav>

<!-- ── MAIN AREA ── -->
<div class="iframe-wrap">

  <!-- Home screen -->
  <div id="home-screen">
    <div class="home-inner">
      <div class="home-eyebrow">Centro de Herramientas</div>
      <div class="home-title"><span>A-LIANZ</span></div>
      <div class="home-qg">— QUALITY GROUP —</div>
      <p class="home-sub">Selecciona una herramienta para comenzar</p>
      <div class="home-cards" id="home-cards"></div>
    </div>
  </div>

  <!-- Loader -->
  <div class="loader" id="loader">
    <div class="loader-spinner"></div>
    <div class="loader-text" id="loader-text">Cargando...</div>
  </div>

  <!-- iFrame -->
  <iframe id="frame" src="about:blank" allowfullscreen></iframe>

</div>

<script>
// ═══════════════════════════════════════════════════════
//  ✏️  AGREGA O EDITA TUS HERRAMIENTAS AQUÍ
// ═══════════════════════════════════════════════════════
var TOOLS = [
  {
    id:      'gt',
    archivo: 'golden-trust.html',
    icono:   '📋',
    color:   'gold',
    tag:     'Operaciones',
    titulo:  'Panel Operativo Golden Trust',
    desc:    'Guiones, WhatsApp, checklists, contador de llamadas, agentes y más.'
  },
  {
    id:      'ip',
    archivo: 'insurepro.html',
    icono:   '🛡️',
    color:   'blue',
    tag:     'Elegibilidad',
    titulo:  'Formulario de Elegibilidad InsurePro',
    desc:    'Recopila datos de elegibilidad, gestiona clientes y exporta PDFs profesionales.'
  },
  {
    id:      'al',
    archivo: 'area_lookup.html',
    icono:   '📞',
    color:   'purple',
    tag:     'Códigos de area',
    titulo:  'Area Code Lookup',
    desc:    'Visualizar la hora según código de área y más.'
  },{
    id:      'pi',
    archivo: 'proof-info.html',
    icono:   '🧾',
    color:   'green',
    tag:     'Prueba de Solicitud de info',
    titulo:  'Prueba de Solicitud card',
    desc:    'Visualiza una tarjeta a través de lo que le pegues desde el Google Sheet.'
  },
  {
    id:      'pf',
    archivo: 'policy-flow.html',
    icono:   '🛂',
    color:   'blue',
    tag:     'Track & Underwriting',
    titulo:  'Control de Polizas y Underwriting',
    desc:    'Herramienta hecha para el Tracking de las polizas y en desarrollo las Compañias disponibles por enfermedades del cliente.'
  }
];

// ── Colores disponibles ──
var COLOR_MAP = {
  gold:   { accent: '#f0a832', bg: 'rgba(240,168,50,0.1)',  border: 'rgba(240,168,50,0.3)',  glow: 'rgba(240,168,50,0.1)',  hover_bg: '#131c2e', hover_border: 'rgba(240,168,50,0.4)',  hover_glow: 'rgba(240,168,50,0.14)',  btn: 'linear-gradient(135deg,#f0a832,#c8881a)', btn_text: '#1a0f00' },
  blue:   { accent: '#3b82f6', bg: 'rgba(59,130,246,0.1)',  border: 'rgba(59,130,246,0.3)',  glow: 'rgba(59,130,246,0.1)',  hover_bg: '#111d30', hover_border: 'rgba(59,130,246,0.4)',  hover_glow: 'rgba(59,130,246,0.14)',  btn: 'linear-gradient(135deg,#3b82f6,#1d4ed8)', btn_text: '#fff'    },
  green:  { accent: '#10b981', bg: 'rgba(16,185,129,0.1)',  border: 'rgba(16,185,129,0.3)',  glow: 'rgba(16,185,129,0.1)', hover_bg: '#0f1f1a', hover_border: 'rgba(16,185,129,0.4)',  hover_glow: 'rgba(16,185,129,0.14)', btn: 'linear-gradient(135deg,#10b981,#059669)', btn_text: '#fff'    },
  red:    { accent: '#ef4444', bg: 'rgba(239,68,68,0.1)',   border: 'rgba(239,68,68,0.3)',   glow: 'rgba(239,68,68,0.1)',  hover_bg: '#1f1010', hover_border: 'rgba(239,68,68,0.4)',   hover_glow: 'rgba(239,68,68,0.14)',   btn: 'linear-gradient(135deg,#ef4444,#dc2626)', btn_text: '#fff'    },
  purple: { accent: '#a855f7', bg: 'rgba(168,85,247,0.1)',  border: 'rgba(168,85,247,0.3)',  glow: 'rgba(168,85,247,0.1)', hover_bg: '#160f20', hover_border: 'rgba(168,85,247,0.4)',  hover_glow: 'rgba(168,85,247,0.14)', btn: 'linear-gradient(135deg,#a855f7,#7c3aed)', btn_text: '#fff'    }
};

// ── Inyectar estilos dinámicos por color ──
function injectColorStyles() {
  var css = '';
  Object.keys(COLOR_MAP).forEach(function(c) {
    var m = COLOR_MAP[c];
    css += '\n'
      + '.home-card.'  + c + '::after { background: linear-gradient(90deg,' + m.accent + ',transparent); }\n'
      + '.home-card.'  + c + ' .card-glow { background: radial-gradient(ellipse at 25% 25%,' + m.glow + ' 0%,transparent 65%); }\n'
      + '.home-card.'  + c + ':hover { border-color:' + m.hover_border + '; background:' + m.hover_bg + '; box-shadow: 0 0 0 1px ' + m.border + ', 0 0 40px ' + m.hover_glow + ', 0 20px 48px rgba(0,0,0,0.4); }\n'
      + '.home-card.'  + c + ' .hc-tag { color:' + m.accent + '; }\n'
      + '.home-card.'  + c + ' .hc-btn { background:' + m.btn + '; color:' + m.btn_text + '; }\n'
      + '.tab-btn.active-' + c + ' { background:' + m.bg + '; border-color:' + m.border + '; color:' + m.accent + '; }\n';
  });
  var style = document.createElement('style');
  style.textContent = css;
  document.head.appendChild(style);
}

// ── Construir nav tabs ──
function buildNav() {
  var nav = document.getElementById('nav-tabs');
  nav.innerHTML = '';
  TOOLS.forEach(function(tool) {
    var btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.id        = 'tab-' + tool.id;
    btn.innerHTML = '<span class="tab-icon">' + tool.icono + '</span><span>' + tool.titulo + '</span>';
    btn.onclick   = function() { cargar(tool); };
    nav.appendChild(btn);
  });
}

// ── Construir cards ──
function buildCards() {
  var grid = document.getElementById('home-cards');
  grid.innerHTML = '';
  TOOLS.forEach(function(tool) {
    var card = document.createElement('div');
    card.className = 'home-card ' + tool.color;
    card.innerHTML =
      '<div class="card-glow"></div>' +
      '<span class="hc-icon">' + tool.icono + '</span>' +
      '<div class="hc-tag">'   + tool.tag   + '</div>'  +
      '<div class="hc-title">' + tool.titulo + '</div>' +
      '<div class="hc-desc">'  + tool.desc   + '</div>' +
      '<button class="hc-btn">Abrir →</button>';
    card.onclick = function() { cargar(tool); };
    grid.appendChild(card);
  });
}

// ── Cargar tool en iframe ──
var tabActivo = null;

function cargar(tool, sinGuardar) {
  var frame      = document.getElementById('frame');
  var loader     = document.getElementById('loader');
  var loaderText = document.getElementById('loader-text');
  var home       = document.getElementById('home-screen');

  if (tabActivo === tool.id) return;
  tabActivo = tool.id;

  // 💾 Guardar la tool activa en localStorage
  if (!sinGuardar) {
    localStorage.setItem('alianz_tool_activa', tool.id);
  }

  home.classList.add('hidden');
  loader.classList.add('show');
  loaderText.textContent = 'Cargando ' + tool.titulo + '...';
  frame.classList.remove('visible');

  document.querySelectorAll('.tab-btn').forEach(function(b) {
    b.className = 'tab-btn';
  });
  var tabEl = document.getElementById('tab-' + tool.id);
  if (tabEl) tabEl.classList.add('active-' + tool.color);

  frame.src = tool.archivo;
  frame.onload = function() {
    loader.classList.remove('show');
    frame.classList.add('visible');
  };
}

function irHome() {
  var frame  = document.getElementById('frame');
  var loader = document.getElementById('loader');
  var home   = document.getElementById('home-screen');

  tabActivo = null;

  // 🗑️ Limpiar tool guardada al ir al inicio manualmente
  localStorage.removeItem('alianz_tool_activa');

  frame.classList.remove('visible');
  loader.classList.remove('show');
  frame.src = 'about:blank';
  home.classList.remove('hidden');

  document.querySelectorAll('.tab-btn').forEach(function(b) {
    b.className = 'tab-btn';
  });
}

// ── 🔄 Restaurar última tool al recargar la página ──
function restaurarUltimaTool() {
  var idGuardado = localStorage.getItem('alianz_tool_activa');
  if (!idGuardado) return; // si no hay nada guardado, mostrar home normal

  var tool = TOOLS.find(function(t) { return t.id === idGuardado; });
  if (tool) {
    cargar(tool, true); // true = no re-guardar en localStorage (ya está guardado)
  }
}

// ── Init ──
injectColorStyles();
buildNav();
buildCards();
restaurarUltimaTool(); // ← restaurar vista al recargar
</script>

</body>
</html>
