<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VidaTrack — Gestión de Pólizas</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f2f5;--bg2:#e8eaed;--surface:#ffffff;--surface2:#f8f9fa;--surface3:#f1f3f5;
  --text:#1a1d23;--text2:#4a5568;--text3:#8b95a3;--text-inv:#ffffff;
  --border:#e2e6ea;--border2:#d0d5dd;
  --accent:#1d4ed8;--accent-h:#1e40af;--accent-lt:#eff6ff;--accent-mid:#bfdbfe;
  --green:#059669;--green-lt:#d1fae5;
  --amber:#d97706;--amber-lt:#fef3c7;
  --red:#dc2626;--red-lt:#fee2e2;
  --purple:#7c3aed;--purple-lt:#ede9fe;
  --cyan:#0891b2;--cyan-lt:#cffafe;
  --orange:#ea580c;--orange-lt:#ffedd5;
  --sh-xs:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh-sm:0 2px 8px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.05);
  --sh-md:0 4px 16px rgba(0,0,0,.10),0 2px 6px rgba(0,0,0,.06);
  --sh-lg:0 8px 32px rgba(0,0,0,.12),0 4px 12px rgba(0,0,0,.07);
  --sh-xl:0 16px 48px rgba(0,0,0,.14),0 6px 18px rgba(0,0,0,.08);
  --sh-accent:0 4px 20px rgba(29,78,216,.25);
  --r:12px;--r-sm:8px;--r-lg:16px;--r-xl:20px;
  --sw:230px;--sc:58px;--th:60px;
}
[data-theme="dark"]{
  --bg:#0d1117;--bg2:#161b22;--surface:#1c2128;--surface2:#21262d;--surface3:#2d333b;
  --text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --border:#30363d;--border2:#444c56;
  --accent:#4f8ef7;--accent-h:#6ea8fb;--accent-lt:rgba(79,142,247,.10);--accent-mid:rgba(79,142,247,.25);
  --green-lt:rgba(5,150,105,.15);--amber-lt:rgba(217,119,6,.15);--red-lt:rgba(220,38,38,.15);
  --purple-lt:rgba(124,58,237,.15);--cyan-lt:rgba(8,145,178,.15);--orange-lt:rgba(234,88,12,.15);
  --sh-xs:0 1px 3px rgba(0,0,0,.3);--sh-sm:0 2px 8px rgba(0,0,0,.4);
  --sh-md:0 4px 16px rgba(0,0,0,.45);--sh-lg:0 8px 32px rgba(0,0,0,.5);
  --sh-xl:0 16px 48px rgba(0,0,0,.55);--sh-accent:0 4px 20px rgba(79,142,247,.3);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;transition:background .35s,color .35s}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* SIDEBAR */
.sidebar{width:var(--sw);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .28s cubic-bezier(.4,0,.2,1);overflow:hidden;position:fixed;top:0;left:0;bottom:0;z-index:100;box-shadow:var(--sh-sm)}
.sidebar.collapsed{width:var(--sc)}
.sidebar-logo{display:flex;align-items:center;gap:11px;padding:16px 14px;border-bottom:1px solid var(--border);min-height:var(--th);flex-shrink:0}
.logo-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),#3b82f6);border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;color:#fff;box-shadow:var(--sh-accent);transition:transform .2s,box-shadow .2s}
.sidebar-logo:hover .logo-mark{transform:scale(1.08) rotate(-4deg);box-shadow:0 6px 24px rgba(29,78,216,.4)}
.logo-text{font-size:1rem;font-weight:800;white-space:nowrap;overflow:hidden;letter-spacing:-.02em;color:var(--text)}
.logo-text span{color:var(--accent)}
.sidebar-section{padding:16px 14px 6px;font-size:.67rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);white-space:nowrap;overflow:hidden;transition:opacity .2s}
.sidebar.collapsed .sidebar-section{opacity:0}
.sidebar-nav{flex:1;padding:6px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r-sm);cursor:pointer;white-space:nowrap;color:var(--text2);font-size:.83rem;font-weight:700;border:none;background:none;width:100%;text-align:left;position:relative;transition:background .15s,color .15s,transform .15s}
.nav-item:hover{background:var(--bg2);color:var(--text);transform:translateX(2px)}
.nav-item.active{background:var(--accent-lt);color:var(--accent)}
.nav-item.active::before{content:'';position:absolute;left:-10px;top:20%;bottom:20%;width:3px;background:var(--accent);border-radius:0 3px 3px 0}
.nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0;transition:transform .2s}
.nav-item:hover .nav-icon{transform:scale(1.15)}
.nav-label{overflow:hidden;text-overflow:ellipsis}
.sidebar-footer{padding:8px 10px 14px;border-top:1px solid var(--border)}
.sidebar-toggle{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r-sm);cursor:pointer;color:var(--text3);font-size:.8rem;font-weight:700;white-space:nowrap;border:none;background:none;width:100%;transition:background .15s,color .15s}
.sidebar-toggle:hover{background:var(--bg2);color:var(--text2)}
.nav-tooltip{position:absolute;left:calc(100% + 12px);top:50%;transform:translateY(-50%);background:var(--text);color:var(--surface);font-size:.71rem;font-weight:800;padding:5px 10px;border-radius:var(--r-sm);white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:200;box-shadow:var(--sh-md)}
.nav-tooltip::before{content:'';position:absolute;right:100%;top:50%;transform:translateY(-50%);border:5px solid transparent;border-right-color:var(--text)}
.sidebar.collapsed .nav-item:hover .nav-tooltip{opacity:1}

/* MAIN */
.main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh;transition:margin-left .28s cubic-bezier(.4,0,.2,1)}
.main.sidebar-collapsed{margin-left:var(--sc)}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:var(--th);border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:50;gap:14px;box-shadow:var(--sh-xs)}
.page-title{font-size:1.05rem;font-weight:800;letter-spacing:-.02em;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:10px}
.search-wrap{position:relative}
.search-wrap input{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:8px 14px 8px 36px;color:var(--text);font-family:inherit;font-size:.82rem;font-weight:600;width:210px;outline:none;transition:border-color .2s,box-shadow .2s,width .3s}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-mid);width:250px}
.search-wrap input::placeholder{color:var(--text3);font-weight:400}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;color:var(--text3)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:.82rem;border-radius:var(--r-sm);padding:8px 16px;transition:all .18s cubic-bezier(.4,0,.2,1);white-space:nowrap;letter-spacing:.01em}
.btn-primary{background:var(--accent);color:#fff;box-shadow:var(--sh-accent)}
.btn-primary:hover{background:var(--accent-h);transform:translateY(-2px);box-shadow:0 6px 24px rgba(29,78,216,.35)}
.btn-primary:active{transform:translateY(0)}
.btn-ghost{background:var(--surface2);border:1.5px solid var(--border);color:var(--text2)}
.btn-ghost:hover{background:var(--bg2);border-color:var(--border2);color:var(--text);transform:translateY(-1px);box-shadow:var(--sh-sm)}
.btn-danger{background:var(--red-lt);border:1.5px solid rgba(220,38,38,.2);color:var(--red)}
.btn-danger:hover{background:rgba(220,38,38,.18);transform:translateY(-1px)}
.theme-toggle{background:var(--surface2);border:1.5px solid var(--border);color:var(--text2);width:36px;height:36px;border-radius:var(--r-sm);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.theme-toggle:hover{background:var(--bg2);transform:rotate(20deg) scale(1.1);box-shadow:var(--sh-sm)}

/* VIEWS */
.view{display:none;flex:1;animation:viewIn .3s ease}
.view.active{display:flex;flex-direction:column}
@keyframes viewIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* STATS BAR */
.stats-bar{display:flex;gap:10px;padding:12px 28px;border-bottom:1px solid var(--border);overflow-x:auto;background:var(--surface);flex-shrink:0}
.stat-chip{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1.5px solid var(--border);border-radius:99px;padding:5px 14px;font-size:.75rem;font-weight:700;color:var(--text2);white-space:nowrap;flex-shrink:0;transition:all .2s;cursor:default;animation:chipIn .35s cubic-bezier(.34,1.3,.64,1) both}
.stat-chip:hover{border-color:var(--border2);box-shadow:var(--sh-sm);transform:translateY(-2px)}
.stat-chip b{color:var(--text);font-weight:800;font-size:.85rem}
.stat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
@keyframes chipIn{from{opacity:0;transform:translateY(8px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}
.stat-chip:nth-child(1){animation-delay:.04s}.stat-chip:nth-child(2){animation-delay:.08s}
.stat-chip:nth-child(3){animation-delay:.12s}.stat-chip:nth-child(4){animation-delay:.16s}
.stat-chip:nth-child(5){animation-delay:.20s}.stat-chip:nth-child(6){animation-delay:.24s}

/* BOARD */
.board{display:flex;gap:12px;padding:22px 28px 40px;overflow-x:auto;flex:1;align-items:flex-start}
.column{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);display:flex;flex-direction:column;min-width:54px;max-height:calc(100vh - 185px);flex-shrink:0;transition:min-width .3s cubic-bezier(.4,0,.2,1),box-shadow .2s;box-shadow:var(--sh-xs)}
.column.has-cards{min-width:275px}
.column.drag-target{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-mid),var(--sh-md)}
.col-accent-bar{height:3.5px;border-radius:var(--r-lg) var(--r-lg) 0 0;flex-shrink:0}
.col-header{padding:13px 14px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:6px;flex-shrink:0}
.col-title{display:flex;align-items:center;gap:8px;font-weight:800;font-size:.78rem;color:var(--text);white-space:nowrap;overflow:hidden;letter-spacing:.01em}
.col-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.col-label-text{overflow:hidden;text-overflow:ellipsis;transition:max-width .3s cubic-bezier(.4,0,.2,1),opacity .25s;max-width:200px}
.column:not(.has-cards) .col-label-text{max-width:0;opacity:0}
.col-count{background:var(--bg2);border:1.5px solid var(--border);border-radius:99px;padding:1px 8px;font-size:.7rem;font-weight:800;color:var(--text2);flex-shrink:0;min-width:24px;text-align:center}
.col-cards{padding:10px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:8px;min-height:70px}
.col-cards.drag-over{background:var(--accent-lt);border-radius:var(--r-sm);outline:2px dashed var(--accent);outline-offset:-4px}

/* CARDS */
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:13px 13px 12px;cursor:grab;position:relative;overflow:hidden;transition:transform .22s cubic-bezier(.34,1.56,.64,1),box-shadow .22s ease,border-color .2s;animation:cardSlideIn .28s cubic-bezier(.34,1.2,.64,1) both;will-change:transform}
@keyframes cardSlideIn{from{opacity:0;transform:translateY(16px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.card:nth-child(1){animation-delay:.04s}.card:nth-child(2){animation-delay:.08s}
.card:nth-child(3){animation-delay:.12s}.card:nth-child(4){animation-delay:.16s}
.card:nth-child(5){animation-delay:.20s}.card:nth-child(6){animation-delay:.24s}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--col-color,var(--accent));border-radius:var(--r) var(--r) 0 0;transform:scaleX(0);transform-origin:left;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.card:hover::before{transform:scaleX(1)}
.card:hover{transform:translateY(-5px) scale(1.015);box-shadow:var(--sh-lg);border-color:var(--border2);z-index:2}
.card:active{cursor:grabbing;transform:scale(.97)}
.card.dragging{opacity:.3;transform:rotate(2deg) scale(.96)}
.card.age-warning{border-left:3.5px solid var(--orange)}
.card.age-danger{border-left:3.5px solid var(--red)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:5px}
.card-name{font-weight:800;font-size:.88rem;color:var(--text);line-height:1.3;letter-spacing:-.01em}
.card-actions{display:flex;gap:3px;flex-shrink:0}
.card-icon-btn{background:none;border:none;color:var(--text3);font-size:13px;cursor:pointer;padding:3px 5px;border-radius:6px;transition:all .15s;line-height:1}
.card-icon-btn:hover{background:var(--bg2);color:var(--text);transform:scale(1.2)}
.card-tipo{font-size:.71rem;font-weight:700;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.card-aseg{display:inline-flex;align-items:center;gap:4px;background:var(--surface3);border:1.5px solid var(--border);border-radius:99px;padding:3px 9px;font-size:.7rem;font-weight:700;color:var(--text2);margin-bottom:8px}
.card-prima{font-size:.88rem;font-weight:800;color:var(--accent);margin-bottom:5px;letter-spacing:-.02em}
.card-fecha{font-size:.71rem;font-weight:600;color:var(--text3)}
.age-badge{display:inline-flex;align-items:center;gap:4px;border-radius:99px;padding:3px 9px;font-size:.68rem;font-weight:800;margin-top:6px}
.age-badge.ok{background:var(--green-lt);color:var(--green)}
.age-badge.warning{background:var(--orange-lt);color:var(--orange)}
.age-badge.danger{background:var(--red-lt);color:var(--red);animation:pulse 1.8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.card-nota{font-size:.71rem;font-weight:500;color:var(--text3);margin-top:8px;padding-top:8px;border-top:1.5px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.move-right-btn{position:absolute;bottom:9px;right:9px;background:var(--accent);color:#fff;border:none;border-radius:6px;width:24px;height:24px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s,transform .2s;box-shadow:var(--sh-accent)}
.card:hover .move-right-btn{opacity:1}
.move-right-btn:hover{transform:translateX(3px) scale(1.15)}
.empty{text-align:center;padding:24px 10px;color:var(--text3);font-size:.75rem;font-weight:600}
.empty-icon{font-size:26px;margin-bottom:6px;opacity:.25}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(10,14,20,.55);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:overlayIn .2s ease}
.modal-overlay.hidden{display:none}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-xl);width:100%;max-width:500px;max-height:92vh;overflow-y:auto;box-shadow:var(--sh-xl);animation:modalIn .28s cubic-bezier(.34,1.3,.64,1)}
@keyframes modalIn{from{transform:translateY(22px) scale(.95);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
.modal-header{padding:20px 22px 16px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:1rem;font-weight:800;letter-spacing:-.02em;color:var(--text)}
.modal-close{background:var(--surface2);border:1.5px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:var(--r-sm);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{background:var(--red-lt);border-color:rgba(220,38,38,.2);color:var(--red);transform:rotate(90deg)}
.modal-body{padding:18px 22px 22px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
label{font-size:.71rem;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.07em}
input,select,textarea{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:9px 12px;color:var(--text);font-family:inherit;font-size:.85rem;font-weight:600;outline:none;transition:border-color .2s,box-shadow .2s,background .2s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-mid);background:var(--surface)}
input::placeholder{color:var(--text3);font-weight:400}
select option{background:var(--surface2);color:var(--text)}
textarea{resize:vertical;min-height:70px;line-height:1.5}
.form-actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end;align-items:center}

/* CARRIERS */
.carriers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:16px;padding:24px 28px;align-content:start}
.carrier-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:20px;transition:all .25s cubic-bezier(.34,1.3,.64,1);box-shadow:var(--sh-xs);animation:cardSlideIn .3s cubic-bezier(.34,1.2,.64,1) both;position:relative;overflow:hidden}
.carrier-card:hover{transform:translateY(-6px) scale(1.01);box-shadow:var(--sh-lg);border-color:var(--border2)}
.carrier-card:nth-child(1){animation-delay:.04s}.carrier-card:nth-child(2){animation-delay:.08s}
.carrier-card:nth-child(3){animation-delay:.12s}.carrier-card:nth-child(4){animation-delay:.16s}
.carrier-card:nth-child(5){animation-delay:.20s}.carrier-card:nth-child(6){animation-delay:.24s}
.carrier-logo{width:50px;height:50px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:14px;color:#fff;box-shadow:var(--sh-md);transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
.carrier-card:hover .carrier-logo{transform:scale(1.14) rotate(-5deg)}
.carrier-name{font-size:1.02rem;font-weight:800;letter-spacing:-.02em;color:var(--text);margin-bottom:10px}
.carrier-info{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.carrier-info span{display:flex;align-items:center;gap:6px;font-size:.79rem;font-weight:600;color:var(--text2)}
.carrier-divider{height:1.5px;background:var(--border);margin:12px 0;border-radius:99px}
.carrier-actions{display:flex;gap:8px}
.disease-config-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.disease-cfg-tag{display:flex;align-items:center;gap:5px;background:var(--red-lt);border:1.5px solid rgba(220,38,38,.18);border-radius:99px;padding:3px 10px;font-size:.71rem;font-weight:800;color:var(--red);transition:all .15s}
.disease-cfg-tag:hover{transform:scale(1.05)}
.disease-cfg-rm{background:none;border:none;cursor:pointer;color:inherit;font-size:12px;padding:0;opacity:.6;transition:opacity .15s,transform .15s;line-height:1}
.disease-cfg-rm:hover{opacity:1;transform:scale(1.2) rotate(90deg)}

/* REQUISITES */
.req-layout{display:grid;grid-template-columns:340px 1fr;flex:1;overflow:hidden}
.req-sidebar{border-right:1.5px solid var(--border);padding:22px 20px;overflow-y:auto;background:var(--surface)}
.req-main{padding:22px 28px;overflow-y:auto;background:var(--bg)}
.disease-list{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.disease-tag{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:8px 11px;font-size:.81rem;font-weight:700;color:var(--text2);animation:cardSlideIn .2s ease;transition:all .15s}
.disease-tag:hover{border-color:var(--border2);box-shadow:var(--sh-xs)}
.disease-remove{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:0 2px;border-radius:4px;transition:all .15s}
.disease-remove:hover{color:var(--red);transform:scale(1.2) rotate(90deg)}
.disease-input-row{display:flex;gap:8px;margin-top:10px}
.disease-input-row input{flex:1}
.carrier-result-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:14px;transition:all .2s ease;animation:cardSlideIn .25s ease both;box-shadow:var(--sh-xs)}
.carrier-result-card:hover{transform:translateX(4px);box-shadow:var(--sh-md)}
.carrier-result-card.accepted{border-left:4px solid var(--green)}
.carrier-result-card.rejected{border-left:4px solid var(--red)}
.result-badge{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.result-badge.accepted{background:var(--green-lt)}
.result-badge.rejected{background:var(--red-lt)}
.result-info{flex:1}
.result-name{font-size:.9rem;font-weight:800;color:var(--text);margin-bottom:3px}
.result-reason{font-size:.76rem;font-weight:600;color:var(--text2)}

/* MISC */
.section-title{font-size:.88rem;font-weight:800;color:var(--text);margin-bottom:12px;letter-spacing:-.01em}
.divider{height:1.5px;background:var(--border);margin:16px 0;border-radius:99px}
.sd-item{display:flex;align-items:center;gap:8px;padding:8px 11px;border-radius:7px;font-size:.81rem;font-weight:700;color:var(--text2);cursor:pointer;transition:background .12s,color .12s;white-space:nowrap}
.sd-item:hover{background:var(--bg2);color:var(--text)}
.sd-item.sd-active{background:var(--sb,var(--accent-lt));color:var(--sc,var(--accent))}
.hidden{display:none!important}

/* VIEW TOGGLE */
.view-toggle{display:flex;align-items:center;gap:2px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:3px}
.vt-btn{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:6px;border:none;cursor:pointer;font-family:inherit;font-size:.78rem;font-weight:700;color:var(--text3);background:none;transition:all .18s}
.vt-btn:hover{color:var(--text2);background:var(--bg2)}
.vt-btn.active{background:var(--surface);color:var(--accent);box-shadow:var(--sh-xs)}

/* TABLE VIEW */
.table-wrap{flex:1;overflow:auto;padding:0 28px 40px}
.poliza-table{width:100%;border-collapse:separate;border-spacing:0;font-size:.82rem;animation:viewIn .25s ease}
.poliza-table thead th{
  position:sticky;top:0;z-index:10;
  background:var(--surface);
  padding:10px 14px;
  text-align:left;
  font-size:.69rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;
  color:var(--text3);
  border-bottom:2px solid var(--border);
  white-space:nowrap;cursor:pointer;user-select:none;
  transition:color .15s,background .15s;
}
.poliza-table thead th:hover{color:var(--text);background:var(--surface2)}
.poliza-table thead th .sort-icon{margin-left:4px;opacity:.4;font-size:.65rem}
.poliza-table thead th.sorted{color:var(--accent)}
.poliza-table thead th.sorted .sort-icon{opacity:1}
.poliza-table tbody tr{
  background:var(--surface);
  transition:background .12s,transform .12s;
  animation:rowIn .22s ease both;
  cursor:pointer;
}
@keyframes rowIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
.poliza-table tbody tr:nth-child(even){background:var(--surface2)}
.poliza-table tbody tr:hover{background:var(--accent-lt);transform:scale(1.0015)}
.poliza-table tbody tr.row-warning{background:rgba(234,88,12,.05)!important}
.poliza-table tbody tr.row-warning:hover{background:rgba(234,88,12,.1)!important}
.poliza-table tbody tr.row-danger{background:rgba(220,38,38,.06)!important}
.poliza-table tbody tr.row-danger:hover{background:rgba(220,38,38,.12)!important}

/* Stagger rows */
.poliza-table tbody tr:nth-child(1){animation-delay:.02s}
.poliza-table tbody tr:nth-child(2){animation-delay:.04s}
.poliza-table tbody tr:nth-child(3){animation-delay:.06s}
.poliza-table tbody tr:nth-child(4){animation-delay:.08s}
.poliza-table tbody tr:nth-child(5){animation-delay:.10s}
.poliza-table tbody tr:nth-child(6){animation-delay:.12s}

.poliza-table td{
  padding:10px 14px;
  border-bottom:1px solid var(--border);
  color:var(--text2);font-weight:600;
  vertical-align:middle;
  white-space:nowrap;
  max-width:180px;overflow:hidden;text-overflow:ellipsis;
}
.poliza-table td.td-num{color:var(--text3);font-size:.75rem;font-weight:800;width:40px}
.poliza-table td.td-name{color:var(--text);font-weight:800;font-size:.85rem}
.poliza-table td.td-prima{color:var(--accent);font-weight:800}
.poliza-table td.td-nota{color:var(--text3);font-size:.75rem;max-width:200px}

.status-pill{
  display:inline-flex;align-items:center;gap:5px;
  border-radius:99px;padding:3px 10px;
  font-size:.71rem;font-weight:800;white-space:nowrap;
  cursor:pointer;transition:all .15s;
}
.status-pill:hover{filter:brightness(.92)}

.age-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}

.table-empty{text-align:center;padding:60px 20px;color:var(--text3)}
.table-edit-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:3px 6px;border-radius:6px;transition:all .15s;opacity:0}
tr:hover .table-edit-btn{opacity:1}
.table-edit-btn:hover{background:var(--bg2);color:var(--text);transform:scale(1.15)}
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">🛡</div>
    <div class="logo-text">Vida<span>Track</span></div>
  </div>

  <nav class="sidebar-nav">
    <button class="nav-item active" onclick="navigate('kanban',this)">
      <span class="nav-icon">📋</span><span class="nav-label">Tablero</span>
      <span class="nav-tooltip">Tablero</span>
    </button>
    <button class="nav-item" onclick="navigate('carriers',this)">

<div class="main" id="mainContent">
  <header class="topbar">

    <div class="topbar-right">

            <datalist id="diseasesSuggestions2"></datalist>

<script>
const DEFAULT_CARRIERS=[
  {id:'c_prudential',nombre:'Prudential',telefono:'1-800-778-2255',codigo:'AG-PRU01',notas:'Requiere examen médico para coberturas > $500k',invalidDiseases:['VIH/SIDA','Cáncer activo','Cirrosis hepática'],isDefault:true},
  {id:'c_metlife',nombre:'MetLife',telefono:'1-800-638-5433',codigo:'AG-MET02',notas:'Procesa en 3-5 días hábiles',invalidDiseases:['VIH/SIDA','Enfermedad renal crónica','Cáncer activo'],isDefault:true},
  {id:'c_aig',nombre:'AIG',telefono:'1-888-760-8144',codigo:'AG-AIG03',notas:'Buenas tarifas para no fumadores',invalidDiseases:['VIH/SIDA','Diabetes tipo 1'],isDefault:true},
  {id:'c_nationwide',nombre:'Nationwide',telefono:'1-877-669-6877',codigo:'AG-NAT04',notas:'Buen plan para adultos mayores',invalidDiseases:['Cáncer activo'],isDefault:true},
  {id:'c_transamerica',nombre:'Transamerica',telefono:'1-888-763-7474',codigo:'AG-TRA05',notas:'Procesa rápido pólizas menores a $250k',invalidDiseases:['VIH/SIDA','Hepatitis C activa','Cáncer activo'],isDefault:true},
];
const KNOWN_DISEASES=['Diabetes tipo 1','Diabetes tipo 2','VIH/SIDA','Cáncer activo','Cáncer en remisión','Enfermedad cardíaca coronaria','Insuficiencia cardíaca','EPOC','Asma severa','Cirrosis hepática','Hepatitis B','Hepatitis C activa','Enfermedad renal crónica','Lupus','Esclerosis múltiple','Alzheimer / Demencia','ACV / Derrame cerebral','Parkinson','Epilepsia','Artritis reumatoide','Obesidad mórbida','Trastorno bipolar','Esquizofrenia'];
/* ══════════════════════════════════════════════════════════════════
   STATUSES — Edit here to add, remove or rename statuses.
   Each entry: id (unique key), label, color (hex), emoji
   Order matters: it controls column order in Kanban and dropdown.
══════════════════════════════════════════════════════════════════ */
const STATUSES = [
  { id:'proceso',   label:'En proceso',           color:'#3b82f6', emoji:'⚙️'  },
  { id:'docs',      label:'Doc. pendiente',        color:'#f59e0b', emoji:'📋'  },
  { id:'enviada',   label:'Enviada a aseguradora', color:'#7c3aed', emoji:'📤'  },
  { id:'aprobada',  label:'Aprobada',              color:'#059669', emoji:'✅'  },
  { id:'emitida',   label:'Emitida / Vigente',     color:'#0891b2', emoji:'🛡️' },
  { id:'rechazada', label:'Rechazada / Cancelada', color:'#dc2626', emoji:'❌'  },
];

/* ══════════════════════════════════════════════════════════════════
   POLICY FIELDS — Edit here to add, remove or rename fields.
   Properties:
     id       : unique key (used in DB and code)
     label    : display name
     type     : 'text' | 'number' | 'select' | 'date' | 'textarea'
     options  : array of strings (only for type:'select')
     required : true | false
     half     : true = half-width in form, false = full-width
     card     : true = show on kanban card
     table    : true = show as column in table view
     tableLabel: short header for table (defaults to label)
     prima    : true = treated as currency field (auto-calc pair)
     primaLink: id of the paired prima field for auto-calculation
══════════════════════════════════════════════════════════════════ */
const FIELDS = [
  { id:'nombre',      label:'Nombre del cliente',       type:'text',     required:true,  half:false, card:true,  table:true  },
  { id:'tipo',        label:'Tipo de póliza',            type:'select',   required:false, half:true,  card:true,  table:false,
    options:['Vida entera','Término / Temporal','Universal','Dotal','Colectiva','Otro'] },
  { id:'aseguradora', label:'Compañía aseguradora',      type:'select',   required:false, half:true,  card:true,  table:true, tableLabel:'Compañía', dynamicOptions:'carriers' },
  { id:'primaMes',    label:'Prima mensual ($)',          type:'number',   required:false, half:true,  card:true,  table:true, tableLabel:'Prima/mes',  prima:true,  primaLink:'primaAnual', primaFactor:12  },
  { id:'primaAnual',  label:'Prima anual ($)',            type:'number',   required:false, half:true,  card:false, table:true, tableLabel:'Prima/año',  prima:true,  primaLink:'primaMes',   primaFactor:1/12 },
  { id:'cobertura',   label:'Cobertura',                 type:'text',     required:false, half:false, card:false, table:false },
  { id:'fechaEnvio',  label:'Fecha envío a aseguradora', type:'date',     required:false, half:true,  card:true,  table:true, tableLabel:'Enviada'  },
  { id:'estado',      label:'Estado',                    type:'status',   required:false, half:true,  card:false, table:true  },
  { id:'notas',       label:'Notas / comentarios',       type:'textarea', required:false, half:false, card:true,  table:true  },
];

// Derived helpers — do NOT edit these
const COLUMNS = STATUSES; // Kanban uses STATUSES directly
const STATUS_MAP = Object.fromEntries(STATUSES.map(s => [s.id, s]));
const FIELD_MAP = Object.fromEntries(FIELDS.map(f => [f.id, f]));
const CARRIER_COLORS=['#1d4ed8','#7c3aed','#0891b2','#059669','#d97706','#dc2626','#0f766e','#9333ea'];

let db;
function initDB(){return new Promise((res,rej)=>{const r=indexedDB.open('vidatrack_v3',1);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('polizas'))d.createObjectStore('polizas',{keyPath:'id'});if(!d.objectStoreNames.contains('carriers'))d.createObjectStore('carriers',{keyPath:'id'})};r.onsuccess=e=>{db=e.target.result;res()};r.onerror=e=>rej(e)})}
const dbGetAll=s=>new Promise((res,rej)=>{const r=db.transaction(s,'readonly').objectStore(s).getAll();r.onsuccess=()=>res(r.result);r.onerror=e=>rej(e)});
const dbPut=(s,o)=>new Promise((res,rej)=>{const r=db.transaction(s,'readwrite').objectStore(s).put(o);r.onsuccess=()=>res();r.onerror=e=>rej(e)});
const dbDelete=(s,id)=>new Promise((res,rej)=>{const r=db.transaction(s,'readwrite').objectStore(s).delete(id);r.onsuccess=()=>res();r.onerror=e=>rej(e)});

let allPolizas=[],allCarriers=[],editingPolizaId=null,editingCarrierId=null;
let searchQuery='',sidebarCollapsed=false,currentTheme='light',tempCarrierDiseases=[];

const PAGE_CONFIG={
  kanban:{title:'Tablero de Pólizas',btn:'+ Nueva Póliza',btnFn:'openModal()',showSearch:true},
  carriers:{title:'Carriers',btn:'+ Nueva Compañía',btnFn:'openCarrierModal()',showSearch:false},
  requisites:{title:'Requisitos Médicos',btn:null,showSearch:false},
};

function navigate(view,el){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('view-'+view).classList.add('active');
  if(el)el.classList.add('active');
  const cfg=PAGE_CONFIG[view];
  document.getElementById('pageTitle').textContent=cfg.title;
  document.getElementById('searchWrap').classList.toggle('hidden',!cfg.showSearch);
  const btn=document.getElementById('primaryActionBtn');
  if(cfg.btn){btn.textContent=cfg.btn;btn.onclick=new Function(cfg.btnFn);btn.classList.remove('hidden')}
  else btn.classList.add('hidden');
  if(view==='carriers')renderCarriers();
  if(view==='requisites')renderRequisites();
  document.getElementById('kanbanToggle').classList.toggle('hidden', view!=='kanban');
}

function toggleSidebar(){
  sidebarCollapsed=!sidebarCollapsed;
  document.getElementById('sidebar').classList.toggle('collapsed',sidebarCollapsed);
  document.getElementById('mainContent').classList.toggle('sidebar-collapsed',sidebarCollapsed);
  document.getElementById('toggleIcon').textContent=sidebarCollapsed?'▶':'◀';
}

function toggleTheme(){
  currentTheme=currentTheme==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme',currentTheme==='dark'?'dark':'');
  document.querySelector('.theme-toggle').textContent=currentTheme==='light'?'☀️':'🌙';
  localStorage.setItem('vt_theme',currentTheme);
}

function businessDaysSince(dateStr){
  if(!dateStr)return 0;
  const start=new Date(dateStr+'T00:00:00'),today=new Date();today.setHours(0,0,0,0);
  let count=0;const cur=new Date(start);
  while(cur<today){cur.setDate(cur.getDate()+1);const d=cur.getDay();if(d!==0&&d!==6)count++}
  return count;
}

function renderBoard(){
  const filtered=searchQuery?allPolizas.filter(p=>p.nombre.toLowerCase().includes(searchQuery.toLowerCase())):allPolizas;
  document.getElementById('statsBar').innerHTML=COLUMNS.map(col=>{
    const count=allPolizas.filter(p=>p.estado===col.id).length;
    return`<div class="stat-chip"><span class="stat-dot" style="background:${col.color}"></span>${col.emoji} ${col.label} <b>${count}</b></div>`;
  }).join('');
  document.getElementById('board').innerHTML=COLUMNS.map((col,ci)=>{
    const cards=filtered.filter(p=>p.estado===col.id),hasCards=cards.length>0,isLast=ci===COLUMNS.length-1;
    return`<div class="column ${hasCards?'has-cards':''}" id="col-${col.id}" ondragover="onDragOver(event,'${col.id}')" ondragleave="onDragLeave(event,'${col.id}')" ondrop="onDrop(event,'${col.id}')">
      <div class="col-accent-bar" style="background:${col.color}"></div>
      <div class="col-header">
        <div class="col-title"><span class="col-dot" style="background:${col.color}"></span><span class="col-label-text">${col.emoji} ${col.label}</span></div>
        <span class="col-count">${cards.length}</span>
      </div>
      <div class="col-cards" id="cards-${col.id}">
        ${hasCards?cards.map(p=>cardHTML(p,col,ci,isLast)).join(''):`<div class="empty"><div class="empty-icon">📭</div>Sin pólizas</div>`}
      </div>
    </div>`;
  }).join('');
}

function cardHTML(p,col,ci,isLast){
  // Build card lines from FIELDS with card:true
  const cardFields = FIELDS.filter(f=>f.card && f.id!=='nombre' && f.id!=='notas' && f.id!=='estado');

  // Aging badge for 'enviada'
  let ageClass='',ageBadge='';
  const enviadaField = FIELDS.find(f=>f.id==='fechaEnvio');
  if(p.estado==='enviada' && p.fechaEnvio){
    const days=businessDaysSince(p.fechaEnvio);
    if(days>=8){ageClass='age-danger';ageBadge=`<div class="age-badge danger">🔴 ${days} días hábiles</div>`}
    else if(days>=5){ageClass='age-warning';ageBadge=`<div class="age-badge warning">🟠 ${days} días hábiles</div>`}
    else if(days>0)ageBadge=`<div class="age-badge ok">🟢 ${days} día${days>1?'s':''} hábil${days>1?'es':''}</div>`;
  }

  // Build field lines
  let lines='';
  cardFields.forEach(f=>{
    const val=p[f.id];
    if(!val) return;
    if(f.id==='tipo') lines+=`<div class="card-tipo">${esc(val)}</div>`;
    else if(f.id==='aseguradora') lines+=`<div class="card-aseg">🏢 ${esc(val)}</div>`;
    else if(f.prima){
      // Only show primaMes on card (skip primaAnual)
      if(f.id==='primaMes') lines+=`<div class="card-prima">$${Number(val).toLocaleString('en-US',{minimumFractionDigits:2})} /mes</div>`;
    }
    else if(f.type==='date') lines+=`<div class="card-fecha">📤 ${formatDate(val)}</div>`;
  });

  const nextCol=COLUMNS[ci+1];
  return`<div class="card ${ageClass}" draggable="true" style="--col-color:${col.color}" ondragstart="onDragStart(event,'${p.id}')" ondragend="onDragEnd(event)">
    <div class="card-top"><div class="card-name">${esc(p.nombre||'Sin nombre')}</div><div class="card-actions"><button class="card-icon-btn" onclick="openEdit('${p.id}')">✏️</button></div></div>
    ${lines}${ageBadge}
    ${p.notas?`<div class="card-nota">📝 ${esc(p.notas)}</div>`:''}
    ${!isLast&&nextCol?`<button class="move-right-btn" title="→ ${nextCol.label}" onclick="event.stopPropagation();moveCard('${p.id}','${nextCol.id}')">▶</button>`:''}
  </div>`;
}

let draggingId=null;
function onDragStart(e,id){draggingId=id;e.dataTransfer.effectAllowed='move';setTimeout(()=>e.target.classList.add('dragging'),0)}
function onDragEnd(e){e.target.classList.remove('dragging');document.querySelectorAll('.col-cards').forEach(c=>c.classList.remove('drag-over'));document.querySelectorAll('.column').forEach(c=>c.classList.remove('drag-target'))}
function onDragOver(e,colId){e.preventDefault();document.getElementById('cards-'+colId)?.classList.add('drag-over');document.getElementById('col-'+colId)?.classList.add('drag-target')}
function onDragLeave(e,colId){document.getElementById('cards-'+colId)?.classList.remove('drag-over');document.getElementById('col-'+colId)?.classList.remove('drag-target')}
function onDrop(e,colId){e.preventDefault();document.getElementById('cards-'+colId)?.classList.remove('drag-over');document.getElementById('col-'+colId)?.classList.remove('drag-target');if(draggingId)moveCard(draggingId,colId)}

async function moveCard(id,newEstado){
  const p=allPolizas.find(x=>x.id===id);if(!p||p.estado===newEstado)return;
  p.estado=newEstado;p.updatedAt=new Date().toISOString();
  await dbPut('polizas',p);allPolizas=await dbGetAll('polizas');renderBoard();if(kanbanView==='table')renderTable();
}

/* ── FORM BUILDER ─────────────────────────────────────────── */
function buildPolizaForm(){
  const grid = document.getElementById('polizaFormGrid');
  if(!grid) return;
  grid.innerHTML = FIELDS
    .filter(f => f.id !== 'estado') // estado handled by its own select
    .map(f => {
      const cls = f.half ? 'form-group' : 'form-group full';
      const req  = f.required ? ' *' : '';
      let input  = '';

      if(f.type === 'text'){
        input = `<input type="text" id="f_${f.id}" placeholder="" />`;
      } else if(f.type === 'number'){
        const onInp = f.primaLink ? `oninput="calcPrima('${f.id}')"` : '';
        input = `<input type="number" id="f_${f.id}" placeholder="0.00" step="0.01" ${onInp} />`;
      } else if(f.type === 'date'){
        input = `<input type="date" id="f_${f.id}" />`;
      } else if(f.type === 'textarea'){
        input = `<textarea id="f_${f.id}" style="min-height:68px"></textarea>`;
      } else if(f.type === 'select'){
        if(f.dynamicOptions === 'carriers'){
          input = `<select id="f_${f.id}"><option value="">Seleccionar...</option></select>`;
        } else {
          const opts = (f.options||[]).map(o=>`<option value="${esc(o)}">${esc(o)}</option>`).join('');
          input = `<select id="f_${f.id}"><option value="">Seleccionar...</option>${opts}</select>`;
        }
      }

      return `<div class="${cls}"><label>${esc(f.label)}${req}</label>${input}</div>`;
    }).join('');

  // Add estado select (always last half-width)
  const estadoField = FIELDS.find(f=>f.id==='estado');
  if(estadoField){
    const div = document.createElement('div');
    div.className = 'form-group';
    div.innerHTML = `<label>${esc(estadoField.label)}</label><select id="f_estado"></select>`;
    grid.appendChild(div);
  }
}

function populateCarrierSelect(){
  const sel = document.getElementById('f_aseguradora');
  if(!sel) return;
  const cur = sel.value;
  sel.innerHTML = '<option value="">Seleccionar...</option>' +
    allCarriers.map(c=>`<option value="${esc(c.nombre)}" ${cur===c.nombre?'selected':''}>${esc(c.nombre)}</option>`).join('');
}

function hexToRgba(hex,alpha){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function populateStatusSelect(){
  const sel = document.getElementById('f_estado');
  if(!sel) return;
  const cur = sel.value;
  sel.innerHTML = STATUSES.map(s=>`<option value="${s.id}" ${cur===s.id?'selected':''}>${s.emoji} ${s.label}</option>`).join('');
}

function openModal(estado='proceso'){
  editingPolizaId = null;
  document.getElementById('modalTitle').textContent = 'Nueva Póliza';
  document.getElementById('btnDeletePoliza').classList.add('hidden');
  buildPolizaForm();
  populateCarrierSelect();
  populateStatusSelect();
  document.getElementById('f_estado').value = estado;
  document.getElementById('modalOverlay').classList.remove('hidden');
}

function openEdit(id){
  const p = allPolizas.find(x=>x.id===id);
  if(!p) return;
  editingPolizaId = id;
  document.getElementById('modalTitle').textContent = 'Editar Póliza';
  document.getElementById('btnDeletePoliza').classList.remove('hidden');
  buildPolizaForm();
  populateCarrierSelect();
  populateStatusSelect();
  // Populate all field values
  FIELDS.forEach(f => {
    const el = document.getElementById('f_'+f.id);
    if(el) el.value = p[f.id] || '';
  });
  document.getElementById('modalOverlay').classList.remove('hidden');
}

function closeModal(){ document.getElementById('modalOverlay').classList.add('hidden'); }

function calcPrima(changedId){
  const changedField = FIELDS.find(f=>f.id===changedId);
  if(!changedField || !changedField.primaLink) return;
  const changedEl = document.getElementById('f_'+changedId);
  const linkedEl  = document.getElementById('f_'+changedField.primaLink);
  if(!changedEl || !linkedEl || !changedEl.value) return;
  linkedEl.value = (parseFloat(changedEl.value) * changedField.primaFactor).toFixed(2);
}

async function savePoliza(){
  const nombreEl = document.getElementById('f_nombre');
  if(!nombreEl || !nombreEl.value.trim()){ alert('El nombre del cliente es requerido.'); return; }
  const poliza = { id: editingPolizaId || crypto.randomUUID(), updatedAt: new Date().toISOString() };
  poliza.createdAt = editingPolizaId
    ? (allPolizas.find(x=>x.id===editingPolizaId)?.createdAt || new Date().toISOString())
    : new Date().toISOString();
  FIELDS.forEach(f => {
    const el = document.getElementById('f_'+f.id);
    poliza[f.id] = el ? el.value.trim() : '';
  });
  await dbPut('polizas', poliza);
  allPolizas = await dbGetAll('polizas');
  renderBoard();
  if(kanbanView==='table') renderTable();
  closeModal();
}

async function confirmDeletePoliza(){
  if(!editingPolizaId || !confirm('¿Eliminar esta póliza?')) return;
  await dbDelete('polizas', editingPolizaId);
  allPolizas = await dbGetAll('polizas');
  renderBoard();
  if(kanbanView==='table') renderTable();
  closeModal();
}

function openCarrierModal(){editingCarrierId=null;tempCarrierDiseases=[];document.getElementById('carrierModalTitle').textContent='Nueva Compañía';document.getElementById('btnDeleteCarrier').classList.add('hidden');['cNombre','cTelefono','cCodigo','cNotas','cDiseaseInput'].forEach(id=>document.getElementById(id).value='');renderCarrierDiseaseList();document.getElementById('carrierModalOverlay').classList.remove('hidden')}
function openCarrierEdit(id){

function addCarrierDisease(){const inp=document.getElementById('cDiseaseInput'),val=inp.value.trim();if(!val||tempCarrierDiseases.includes(val))return;tempCarrierDiseases.push(val);inp.value='';renderCarrierDiseaseList()}
function removeCarrierDisease(d){tempCarrierDiseases=tempCarrierDiseases.filter(x=>x!==d);renderCarrierDiseaseList()}

async function saveCarrier(){

  const carrier={id:editingCarrierId||crypto.randomUUID(),nombre,telefono:document.getElementById('cTelefono').value.trim(),codigo:document.getElementById('cCodigo').value.trim(),notas:document.getElementById('cNotas').value.trim(),invalidDiseases:[...tempCarrierDiseases]};

let reqDiseases=[];
function addReqDisease(){const inp=document.getElementById('reqDiseaseInput'),val=inp.value.trim();if(!val||reqDiseases.includes(val))return;reqDiseases.push(val);inp.value='';renderReqDiseaseList();evalRequisites()}
function removeReqDisease(d){reqDiseases=reqDiseases.filter(x=>x!==d);renderReqDiseaseList();evalRequisites()}
function renderReqDiseaseList(){document.getElementById('reqDiseaseList').innerHTML=reqDiseases.map(d=>`<div class="disease-tag"><span>🩺 ${esc(d)}</span><button class="disease-remove" onclick="removeReqDisease('${esc(d)}')">✕</button></div>`).join('')}
function clearReqForm(){reqDiseases=[];document.getElementById('reqClientName').value='';document.getElementById('reqDiseaseInput').value='';renderReqDiseaseList();evalRequisites()}

function evalRequisites(){
  const client=document.getElementById('reqClientName').value.trim(),results=document.getElementById('reqResults');
  if(!client&&reqDiseases.length===0){
    results.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;color:var(--text3);text-align:center;gap:14px"><div style="font-size:52px;opacity:.15">🩺</div><div style="font-size:.95rem;font-weight:800;color:var(--text2)">Ingresa datos del cliente</div><div style="font-size:.8rem;max-width:260px;line-height:1.6">Completa el nombre y agrega condiciones médicas para ver la evaluación por compañía.</div></div>`;
    return;
  }
  if(allCarriers.length===0){results.innerHTML=`<div style="text-align:center;padding:40px;color:var(--text3)">No hay carriers configurados.</div>`;return}
  const evaluated=allCarriers.map(c=>{const blocked=(c.invalidDiseases||[]).filter(d=>reqDiseases.some(rd=>rd.toLowerCase()===d.toLowerCase()));return{carrier:c,blocked,status:blocked.length===0?'accepted':'rejected'}});
  const accepted=evaluated.filter(e=>e.status==='accepted'),rejected=evaluated.filter(e=>e.status==='rejected');
  results.innerHTML=`
    <div style="margin-bottom:22px">
      <div class="section-title" style="font-size:1.05rem">${client?`Evaluación — <span style="color:var(--accent)">${esc(client)}</span>`:'Resultado'}</div>
      ${reqDiseases.length?`<div style="font-size:.79rem;font-weight:700;color:var(--text2);margin-bottom:14px">Condiciones: ${reqDiseases.map(d=>`<b>${esc(d)}</b>`).join(', ')}</div>`:''}
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <div class="stat-chip" style="background:var(--green-lt);border-color:rgba(5,150,105,.2);color:var(--green)">✅ Aceptan <b>${accepted.length}</b></div>
        <div class="stat-chip" style="background:var(--red-lt);border-color:rgba(220,38,38,.2);color:var(--red)">❌ Rechazan <b>${rejected.length}</b></div>
      </div>
    </div>
    ${accepted.length?`<div style="font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--green);margin-bottom:10px">✅ Compañías que aceptan</div>${accepted.map((e,i)=>`<div class="carrier-result-card accepted" style="animation-delay:${i*.06}s"><div class="result-badge accepted">✅</div><div class="result-info"><div class="result-name">${esc(e.carrier.nombre)}</div><div class="result-reason" style="color:var(--green)">Sin restricciones declaradas</div>${e.carrier.codigo?`<div class="result-reason" style="color:var(--text3);margin-top:2px">Código: ${esc(e.carrier.codigo)}</div>`:''}</div></div>`).join('')}`:''}
    ${rejected.length?`<div style="font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--red);margin:18px 0 10px">❌ No aplican</div>${rejected.map((e,i)=>`<div class="carrier-result-card rejected" style="animation-delay:${(accepted.length+i)*.06}s"><div class="result-badge rejected">❌</div><div class="result-info"><div class="result-name">${esc(e.carrier.nombre)}</div><div class="result-reason">No aceptadas: ${e.blocked.map(d=>`<b>${esc(d)}</b>`).join(', ')}</div></div></div>`).join('')}`:''}`;
}
function renderRequisites(){evalRequisites()}

function updateDiseaseSuggestions(){
  const all=[...new Set([...KNOWN_DISEASES,...allCarriers.flatMap(c=>c.invalidDiseases||[])])];
  ['diseasesSuggestions','diseasesSuggestions2'].forEach(id=>{const dl=document.getElementById(id);if(dl)dl.innerHTML=all.map(d=>`<option value="${esc(d)}">`).join('')});

/* === TABLE VIEW === */
let kanbanView='kanban';
let sortCol='createdAt', sortDir=1;
// STATUS_CFG replaced by STATUS_MAP (derived from STATUSES above)
function setKanbanView(v){
  kanbanView=v;
  document.getElementById('board').classList.toggle('hidden',v==='table');
  document.getElementById('tableWrap').classList.toggle('hidden',v==='kanban');
  document.getElementById('btnKanban').classList.toggle('active',v==='kanban');
  document.getElementById('btnTable').classList.toggle('active',v==='table');
  if(v==='table') renderTable();
}
function sortTable(col){
  if(sortCol===col)sortDir*=-1; else{sortCol=col;sortDir=1}
  document.querySelectorAll('.poliza-table thead th').forEach(th=>th.classList.remove('sorted'));
  const th=document.getElementById('th-'+col);
  if(th){th.classList.add('sorted');const si=th.querySelector('.sort-icon');if(si)si.textContent=sortDir===1?'↑':'↓'}
  renderTable();
}
function buildTableHead(){
  const tableFields = FIELDS.filter(f=>f.table);
  const head = document.getElementById('polizaTableHead');
  if(!head) return;
  head.innerHTML = `<tr>
    <th onclick="sortTable('_idx')" id="th-_idx"># <span class="sort-icon">&#x21D5;</span></th>
    <th onclick="sortTable('createdAt')" id="th-createdAt">Fecha <span class="sort-icon">&#x21D5;</span></th>
    ${tableFields.map(f=>`
      <th onclick="sortTable('${f.id}')" id="th-${f.id}">
        ${esc(f.tableLabel||f.label)} <span class="sort-icon">&#x21D5;</span>
      </th>`).join('')}
    <th id="th-age">Antigüedad</th>
    <th></th>
  </tr>`;
}

function renderTable(){
  buildTableHead();
  const tableFields = FIELDS.filter(f=>f.table);
  const filtered = searchQuery
    ? allPolizas.filter(p=>p.nombre&&p.nombre.toLowerCase().includes(searchQuery.toLowerCase()))
    : allPolizas;

  const sorted = [...filtered].sort((a,b)=>{
    let av = sortCol==='_idx' ? filtered.indexOf(a) : (a[sortCol]??'');
    let bv = sortCol==='_idx' ? filtered.indexOf(b) : (b[sortCol]??'');
    const f = FIELD_MAP[sortCol];
    if(f && (f.type==='number'||f.prima)){ av=parseFloat(av)||0; bv=parseFloat(bv)||0; }
    if(av<bv) return -sortDir; if(av>bv) return sortDir; return 0;
  });

  if(!sorted.length){
    document.getElementById('tableBody').innerHTML=`<tr><td colspan="${tableFields.length+4}" style="padding:60px;color:var(--text3);text-align:center;font-weight:700">Sin pólizas registradas</td></tr>`;
    return;
  }

  document.getElementById('tableBody').innerHTML = sorted.map((p,i)=>{
    const s0 = STATUS_MAP[p.estado];
    const sc = s0 ? {label:s0.label, bg:hexToRgba(s0.color,.12), color:s0.color} : {label:p.estado||'—', bg:'var(--bg2)', color:'var(--text2)'};

    let ageHtml='—', rowCls='';
    if(p.estado==='enviada' && p.fechaEnvio){
      const days=businessDaysSince(p.fechaEnvio);
      if(days>=8){rowCls='row-danger';ageHtml=`<span style="display:inline-flex;align-items:center;gap:4px;background:var(--red-lt);color:var(--red);border-radius:99px;padding:2px 8px;font-size:.69rem;font-weight:800">🔴 ${days}d</span>`}
      else if(days>=5){rowCls='row-warning';ageHtml=`<span style="display:inline-flex;align-items:center;gap:4px;background:var(--orange-lt);color:var(--orange);border-radius:99px;padding:2px 8px;font-size:.69rem;font-weight:800">🟠 ${days}d</span>`}
      else if(days>0) ageHtml=`<span style="display:inline-flex;align-items:center;gap:4px;background:var(--green-lt);color:var(--green);border-radius:99px;padding:2px 8px;font-size:.69rem;font-weight:800">🟢 ${days}d</span>`;
    }

    // Build each table field cell
    const cells = tableFields.map(f=>{
      const val = p[f.id]??'';
      if(f.id==='estado'){
        return `<td style="position:relative"><span class="status-pill" style="background:${sc.bg};color:${sc.color}" onclick="event.stopPropagation();openStatusDropdown(event,'${p.id}')"><span class="age-dot" style="background:${sc.color}"></span>${esc(sc.label)} <span style="font-size:.65rem;opacity:.7">▾</span></span></td>`;
      }
      if(f.id==='nombre'){
        return `<td class="td-name">${esc(val||'—')}</td>`;
      }
      if(f.prima){
        const fmt = val ? `$${Number(val).toLocaleString('en-US',{minimumFractionDigits:2})}` : '—';
        return `<td class="td-prima">${fmt}</td>`;
      }
      if(f.type==='date'){
        return `<td>${formatDate(val)}</td>`;
      }
      if(f.id==='notas'){
        return `<td class="td-nota" title="${esc(val)}">${esc(val||'—')}</td>`;
      }
      return `<td>${esc(val||'—')}</td>`;
    }).join('');

    return `<tr class="${rowCls}" onclick="openEdit('${p.id}')">
      <td class="td-num">${i+1}</td>
      <td>${formatDate(p.createdAt)}</td>
      ${cells}
      <td>${ageHtml}</td>
      <td><button class="table-edit-btn" onclick="event.stopPropagation();openEdit('${p.id}')">✏️</button></td>
    </tr>`;
  }).join('');
}



/* ══ HELPERS ══ */

function esc(str){
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function formatDate(str){
  if(!str)return'—';
  try{return new Date(str+'T00:00:00').toLocaleDateString('es-US',{day:'2-digit',month:'short',year:'numeric'})}
  catch{return str}
}

/* ══ MODAL CLOSE ON OVERLAY CLICK ══ */
['modalOverlay','carrierModalOverlay'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){
    if(e.target===this)this.classList.add('hidden');

(async()=>{
  await initDB();

    document.documentElement.setAttribute('data-theme','dark');
